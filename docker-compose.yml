services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lumi-api
    restart: unless-stopped
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://lumi:${POSTGRES_PASSWORD:-lumi}@postgres:5432/lumi_draw
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: lumi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumi_draw
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: lumi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  redis-data:
