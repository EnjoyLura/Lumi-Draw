version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumidraw-postgres
    environment:
      POSTGRES_USER: lumidraw
      POSTGRES_PASSWORD: lumidraw2025
      POSTGRES_DB: lumidraw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumidraw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumidraw-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lumidraw-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=lumidraw
      - DB_PASSWORD=lumidraw2025
      - DB_DATABASE=lumidraw
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=lumidraw-jwt-secret-2025
      - JWT_EXPIRES_IN=7d
      - ADMIN_JWT_SECRET=lumidraw-admin-jwt-secret-2025
      - WX_APPID=wxbb3da1bed70db50f
      - WX_APPSECRET=30f3dc0e253e740e9c76a34eab3c9652
      - WX_MCH_ID=1114583055
      - WX_MCH_API_KEY=lbh45082120020908307718894800646
      - KIE_API_BASE=https://api.kie.ai
      - KIE_API_KEY=009ee8a806d45dbda1a2bc37ef3a2165
      - KIE_CALLBACK_URL=https://ejoyflie.cloud/api/generate/callback
      - OSS_ACCESS_KEY_ID=YOUR_OSS_ACCESS_KEY_ID
      - OSS_ACCESS_KEY_SECRET=YOUR_OSS_ACCESS_KEY_SECRET
      - OSS_BUCKET=lumidraw
      - OSS_ENDPOINT=oss-cn-beijing.aliyuncs.com
      - OSS_REGION=oss-cn-beijing
      - PUBLIC_URL=http://122.51.235.145
      - DOMAIN=ejoyflie.cloud
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: lumidraw-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./admin/dist:/usr/share/nginx/html/admin:ro
      - ./miniapp/dist/build/h5:/usr/share/nginx/html/miniapp:ro
    depends_on:
      - server
    restart: always

volumes:
  pgdata:
  redisdata:
